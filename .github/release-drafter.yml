---
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
commitish: main
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
sort-direction: ascending

categories:
  - title: "🚀 Features"
    labels:
      - "enhancement"
      - "feat"
      - "feature"
  - title: "🐛 Fixes"
    labels:
      - "bug"
      - "fix"
      - "bugfix"
  - title: "🧪 Testing"
    labels:
      - "testing"
      - "test"
  - title: "📚 Documentation"
    labels:
      - "documentation"
      - "docs"
  - title: "🔧 Maintenance"
    labels:
      - "refactoring"
      - "refactor"
      - "chore"
      - "maintenance"
  - title: "⚠️ Breaking Changes"
    labels:
      - "breaking"
      - "breaking-change"
  - title: "🔄 Dependencies"
    labels:
      - "dependencies"
      - "build"
  - title: "🔀 Other Changes"
    labels:
      - "*"

version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
      - "breaking-change"
  minor:
    labels:
      - "minor"
      - "feature"
      - "feat"
      - "enhancement"
  patch:
    labels:
      - "patch"
      - "bugfix"
      - "fix"
      - "bug"
  default: patch

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
