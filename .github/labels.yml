---
# GitHub labels for Hume AI TTS
# These labels are automatically configured using GitHub Labeler Action
# https://github.com/marketplace/actions/github-labeler
#
# Labels are used by Release Drafter to organize changelog entries

# Feature labels
- name: feature
  description: New feature
  color: a2eeef

- name: enhancement
  description: Enhancement to existing functionality
  color: a2eeef

# Bug labels
- name: bug
  description: Something isn't working
  color: d73a4a

- name: fix
  description: Bug fix
  color: d73a4a

# Testing labels
- name: test
  description: Testing and test improvements
  color: b1fc6f

# Documentation labels
- name: docs
  description: Improvements or additions to documentation
  color: 0075ca

# Maintenance labels
- name: chore
  description: Maintenance or chore task
  color: ef67c4

- name: maintenance
  description: Maintenance changes
  color: ef67c4

# Dependency labels
- name: dependencies
  description: Pull requests that update a dependency file
  color: 0366d6

# Breaking change labels
- name: breaking
  description: Breaking change
  color: bfd4f2

- name: breaking-change
  description: Breaking change
  color: bfd4f2

# Version bump labels
- name: major
  description: Triggers a major version bump
  color: e11d48

- name: minor
  description: Triggers a minor version bump
  color: f97316

- name: patch
  description: Triggers a patch version bump
  color: 22c55e

# Issue management labels
- name: help wanted
  description: Extra attention is needed
  color: 008672

- name: good first issue
  description: Good for newcomers
  color: 7057ff

- name: question
  description: Further information is requested
  color: d876e3

- name: duplicate
  description: This issue or pull request already exists
  color: cfd3d7

- name: invalid
  description: This doesn't seem right
  color: e4e669

- name: wontfix
  description: This will not be worked on
  color: ffffff
